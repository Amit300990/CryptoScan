kind = "web"
previewPath = "/"
title = "Cryptography Manager"
version = "1.0.0"
id = "artifacts/crypto-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18978

[services.development]
run = "pnpm --filter @workspace/crypto-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-manager", "run", "build" ]
publicDir = "artifacts/crypto-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18978"
BASE_PATH = "/"
